<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartPort App — Pemesanan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: #0f2744;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 8px;
      position: fixed;
      top: 0; left: 0;
    }

    .sidebar-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-title {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #a3b8d4;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.13);
      color: #fff;
      font-weight: 600;
    }

    .nav-item:not(.active):hover {
      background: rgba(255,255,255,0.07);
      color: #cdd9ea;
    }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── MAIN ── */
    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f2744;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #d1dce8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CONTENT ── */
    .content {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-cetak {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #0f2744;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 10px;
      border: 1.5px solid #c8d5e3;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-cetak:hover {
      background: #f0f6ff;
      border-color: #1e6fb5;
      color: #1e6fb5;
    }

    .date-display {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #0f2744;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1.5px solid #c8d5e3;
    }

    /* ── TABLE SECTION ── */
    .table-section {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e8edf3;
      padding: 24px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .table-wrapper { overflow-x: auto; }

    .sp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sp-table thead tr { background: #1e3a5f; }

    .sp-table thead th {
      color: #fff;
      font-weight: 600;
      padding: 13px 16px;
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    .sp-table thead th:first-child { border-radius: 12px 0 0 12px; }
    .sp-table thead th:last-child  { border-radius: 0 12px 12px 0; }

    .sp-table tbody tr { border-bottom: 1px solid #f0f4f8; }
    .sp-table tbody tr:last-child { border-bottom: none; }

    .sp-table tbody td {
      padding: 15px 16px;
      color: #334155;
    }

    .sp-table tbody tr:hover td { background: #f8fafc; }

    .id-cell {
      color: #0f2744;
      font-weight: 700;
    }

    .name-cell { font-weight: 600; color: #0f2744; }

    .badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-sukses  { background: #dcfce7; color: #166534; }
    .badge-gagal   { background: #fee2e2; color: #b91c1c; }
    .badge-pending { background: #fef9c3; color: #854d0e; }

    /* ── PRINT STYLE ── */
    @media print {
      .sidebar, .topbar, .toolbar { display: none !important; }
      .main { margin-left: 0; }
      body { background: #fff; }
      .table-section { box-shadow: none; border: none; padding: 0; }
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 16px 8px; }
      .sidebar-title, .nav-item span { display: none; }
      .sidebar-logo .logo-circle { width: 44px; height: 44px; }
      .main { margin-left: 60px; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-circle">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <path d="M10 30h28l-5-10H15L10 30z" fill="#0f2744"/>
          <rect x="19" y="15" width="10" height="8" rx="1.5" fill="#1e6fb5"/>
          <rect x="23" y="11" width="2" height="5" rx="1" fill="#1e6fb5"/>
          <path d="M6 33h36" stroke="#0f2744" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="15" cy="37" r="2.5" fill="#1e6fb5"/>
          <circle cx="24" cy="37" r="2.5" fill="#1e6fb5"/>
          <circle cx="33" cy="37" r="2.5" fill="#1e6fb5"/>
        </svg>
      </div>
      <div class="sidebar-title">Pelabuhan Pintar</div>
    </div>

    <a href="/admin/dashboard" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" opacity="0.6"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" opacity="0.6"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" opacity="0.6"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a href="/admin/jadwal" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M3 5h14M3 10h14M3 15h8"/>
      </svg>
      <span>Jadwal Keberangkatan</span>
    </a>

    <a href="/admin/pemesanan" class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="14" height="14" rx="2"/>
        <path d="M7 7h6M7 10h6M7 13h4"/>
      </svg>
      <span>Pemesanan</span>
    </a>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <h1 class="topbar-title">Pemesanan</h1>
      <div class="avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" fill="#94a3b8"/>
          <path d="M4 20c0-4.418 3.582-7 8-7s8 2.582 8 7" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">

      <!-- TOOLBAR -->
      <div class="toolbar">
        <button class="btn-cetak" onclick="window.print()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9V2h12v7"/>
            <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8" rx="1"/>
          </svg>
          Cetak
        </button>
        <div class="date-display">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="tanggalDisplay"></span>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-section">
        <div class="table-wrapper">
          <table class="sp-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Kapal</th>
                <th>Tujuan</th>
                <th>Waktu</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    // Set tanggal hari ini format DD/MM/YYYY
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    document.getElementById('tanggalDisplay').textContent = `${dd}/${mm}/${yyyy}`;

    // Data pemesanan
    const pemesanan = [
      { id: 1, nama: 'Oliver', email: 'Oliver123@gmail.com', kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 2, nama: 'Ben',    email: 'Ben123@gmail.com',    kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 3, nama: 'Muek',   email: 'Muek123@gmail.com',   kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 4, nama: 'Wandi',  email: 'Wandi123@gmail.com',  kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 5, nama: 'Bey',    email: 'Bey123@gmail.com',    kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 6, nama: 'Kame',   email: 'Kame123@gmail.com',   kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
      { id: 7, nama: 'Russ',   email: 'Russ123@gmail.com',   kapal: 'Izuocha', tujuan: 'Tj. Uban', waktu: '09.00', status: 'Sukses'  },
    ];

    function badgeClass(status) {
      if (status === 'Sukses')  return 'badge-sukses';
      if (status === 'Gagal')   return 'badge-gagal';
      return 'badge-pending';
    }

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = pemesanan.map(r => `
      <tr>
        <td class="id-cell">${r.id}</td>
        <td class="name-cell">${r.nama}</td>
        <td style="color:#475569">${r.email}</td>
        <td>${r.kapal}</td>
        <td>${r.tujuan}</td>
        <td style="font-weight:600;color:#0f2744">${r.waktu}</td>
        <td><span class="badge ${badgeClass(r.status)}">${r.status}</span></td>
      </tr>
    `).join('');
  </script>

</body>
</html>
