<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pelabuhan Pintar</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="brand">
                <h1>Pelabuhan Pintar</h1>
                <p>Pelabuhan Telaga Punggur</p>
            </div>
            <div class="nav-buttons">
                <a href="/register" class="btn btn-outline">Cek Booking</a>
                <button class="btn btn-login" onclick="window.location.href='/login'">Log in</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <div class="hero-text">
                <h2>Selamat Datang di Sistem SmartPort</h2>
                <p>Monitoring Arus Kendaraan Secara Real-Time</p>
            </div>
        </div>
    </section>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h3>Cek Pesanan</h3>
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Username</label>
                        <input type="email" id="email" name="email" required placeholder="Masukkan email terdaftar">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Masukkan password">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                    
                    <p class="auth-link">
                        Belum punya akun? <a href="/register">Daftar di sini</a>
                    </p>
                </form>
            </div>
        </div>
    </section>

    <script src="/js/auth.js"></script>
</body>
</html>
